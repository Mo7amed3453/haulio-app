name: web-dashboard-ci

on:
  push:
    paths:
      - 'web-dashboard/**'
      - '.github/workflows/web-dashboard-ci.yml'
  pull_request:
    paths:
      - 'web-dashboard/**'
      - '.github/workflows/web-dashboard-ci.yml'

defaults:
  run:
    working-directory: web-dashboard

jobs:
  ci:
    name: Lint · Typecheck · Build · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('web-dashboard/package.json') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
          VITE_TILES_URL: https://tile.openstreetmap.org/{z}/{x}/{y}.png

      - name: Unit tests (Vitest)
        run: pnpm test
