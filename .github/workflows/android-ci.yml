name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Debug - show settings
        run: cat settings.gradle.kts

      - name: Assemble Debug
        run: gradle --no-search-upward :app:assembleDebug

      - name: Unit Tests
        run: gradle --no-search-upward :app:testDebugUnitTest
