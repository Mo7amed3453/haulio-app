name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble Debug
        working-directory: android
        run: gradle -c settings.gradle.kts :app:assembleDebug

      - name: Unit Tests
        working-directory: android
        run: gradle -c settings.gradle.kts :app:testDebugUnitTest
